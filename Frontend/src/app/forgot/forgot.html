<div class="card" style="max-width: 520px; margin: 0 auto;">
  <div class="section-title">
    <div>
      <p class="pill">Recuperar acceso</p>
      <h2>Olvidé mi contraseña</h2>
      <p class="muted">Te enviaremos un enlace para restablecerla.</p>
    </div>
  </div>

  <div class="stack">
    <div class="input-group">
      <label>Email <span class="required">*</span></label>
      <input type="email" [(ngModel)]="email" placeholder=""
             [class.input-error]="submitted && !email">
      @if (submitted && !email) {
        <span class="field-error">Campo obligatorio</span>
      }
    </div>
    <button class="btn" (click)="solicitar()">Enviar enlace</button>

    @if (success) { <p class="feedback success">{{ success }}</p> }
    @if (error) { <p class="feedback error">{{ error }}</p> }
  </div>
</div>
