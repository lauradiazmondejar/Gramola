spring.application.name=demo

#BASE DE DATOS (ACCESO SI USAMOS SPRING)
#spring.datasource.url = jdbc:mysql://172.20.48.23:3306/gramola?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.url = jdbc:mysql://localhost:3306/gramola?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username = root
spring.datasource.password = 

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl auto (create, create-drop, validate, update)
 spring.jpa.hibernate.ddl-auto = update
# spring.jpa.hibernate.ddl-auto = create
#none

server.error.include-message=always

logging.org.hibernate.SQL=DEBUG
logging.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ---- Correo (MailHog - servidor local) ----
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# URLs y configuracion global almacenadas en BD (tabla config)
# Spring ejecuta data.sql despues de que Hibernate cree las tablas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Clave simétrica para cifrar secretos sensibles (clientSecret de Spotify). Cambia este valor en despliegue.
app.crypto.key=change-me-please-change-me-32bytes

# Clave secreta de Stripe (no hardcodear en código). Ejemplo: sk_test_xxx
stripe.secret-key=
